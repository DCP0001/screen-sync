<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ScreenSync room — Share and view screens in real time.">
  <title>ScreenSync — Room</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-blob bg-blob--violet"></div>
    <div class="bg-blob bg-blob--cyan"></div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Disconnected overlay -->
  <div class="disconnected-overlay hidden" id="disconnected-overlay">
    <div class="disconnected-overlay__icon">📡</div>
    <h2 class="disconnected-overlay__title" id="disconnect-title">Disconnected</h2>
    <p class="disconnected-overlay__subtitle" id="disconnect-subtitle">
      The connection was lost. Attempting to reconnect…
    </p>
    <div class="disconnected-overlay__actions">
      <button class="btn btn-primary" id="btn-reconnect">🔄 Reconnect</button>
      <a href="/" class="btn btn-secondary" id="btn-go-home">← Back to Home</a>
    </div>
  </div>

  <!-- Room layout -->
  <div class="page-content">
    <div class="room-layout">

      <!-- Top bar -->
      <div class="glass-card top-bar" id="top-bar">
        <div class="top-bar__left">
          <a href="/" class="logo" id="room-logo">
            <img src="/assets/favicon.svg" alt="" class="logo__icon" style="width:28px;height:28px">
            <span class="logo__text" style="font-size:1.1rem">ScreenSync</span>
          </a>

          <div class="room-id-badge" id="room-id-badge" title="Click to copy room link">
            <span class="room-id-badge__code" id="room-id-display">--------</span>
            <span class="room-id-badge__copy">📋 Copy</span>
          </div>
        </div>

        <div class="top-bar__right">
          <div class="status-pill" id="host-status-pill">
            <span class="status-dot status-dot--warning" id="host-status-dot"></span>
            <span id="host-status-text">Connecting…</span>
          </div>
          <div class="status-pill" id="viewer-count-pill">
            <span>👥</span>
            <span id="viewer-count">0</span>
          </div>
        </div>
      </div>

      <!-- Main stage -->
      <div class="main-stage" id="main-stage">

        <!-- Lobby state (shown before sharing starts) -->
        <div class="video-container" id="video-wrapper">

          <!-- Overlay: lobby / waiting -->
          <div class="video-container__overlay" id="lobby-overlay">
            <div class="lobby-state">
              <div class="lobby-state__icon" id="lobby-icon">🖥️</div>
              <h2 class="lobby-state__title" id="lobby-title">Ready to share</h2>
              <p class="lobby-state__subtitle" id="lobby-subtitle">
                Click "Share Screen" below to start streaming your screen to viewers.
              </p>
            </div>
          </div>

          <!-- Video element -->
          <video id="remote-video" autoplay playsinline></video>
        </div>
      </div>

      <!-- Control bar -->
      <div class="glass-card control-bar" id="control-bar">

        <!-- Host controls -->
        <button class="btn btn-primary" id="btn-share" title="Share your screen">
          🖥️ Share Screen
        </button>
        <button class="btn btn-danger hidden" id="btn-stop-share" title="Stop sharing">
          ⏹️ Stop Sharing
        </button>

        <!-- Viewer controls -->
        <button class="btn btn-secondary hidden" id="btn-fullscreen" title="Toggle fullscreen">
          ⛶ Fullscreen
        </button>

        <!-- Common controls -->
        <button class="btn btn-secondary" id="btn-copy-link" title="Copy room link">
          🔗 Copy Link
        </button>
        <button class="btn btn-danger" id="btn-leave" title="Leave room" style="padding:14px 20px">
          🚪 Leave
        </button>
      </div>

    </div>
  </div>

  <script src="/js/signaling.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
